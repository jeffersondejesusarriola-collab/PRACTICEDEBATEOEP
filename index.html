<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Structured Chaos Debate Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes pulse-fast {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
            50% { transform: scale(1.02); box-shadow: 0 20px 25px -5px rgba(239, 68, 68, 0.2); }
        }
        .active-agree {
            animation: pulse-fast 1.5s infinite;
            border-color: #10b981 !important;
            background-color: #f0fdf4 !important;
        }
        .active-disagree {
            animation: pulse-fast 1.5s infinite;
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 p-8 text-center">
        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-red-600 mb-2 tracking-wide">
            🔥 STRUCTURED CHAOS DEBATE 🔥
        </h1>
        <p class="text-slate-500 mb-8 text-xs font-bold uppercase tracking-widest">3-Minute Showdown • 30-Second Interruptions</p>

        <!-- Topic Display -->
        <div class="bg-slate-100 rounded-xl p-6 border border-slate-200 mb-8 min-h-[100px] flex flex-col justify-center items-center shadow-inner">
            <span class="text-xs font-bold text-amber-600 uppercase tracking-wider mb-2">Today's Stupid Issue:</span>
            <div id="topic-display" class="text-xl md:text-2xl font-extrabold text-slate-800 italic">
                Click "Start Chaotic Debate" to begin...
            </div>
        </div>

        <!-- Timers Layout -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div class="text-xs text-slate-500 uppercase font-bold tracking-wider">Total Debate Time</div>
                <!-- Default set to 03:00 -->
                <div id="total-timer" class="text-3xl font-mono font-black text-slate-700">03:00</div>
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div class="text-xs text-slate-500 uppercase font-bold tracking-wider">Interrupt Counter</div>
                <div id="turn-timer" class="text-3xl font-mono font-black text-red-600">30s</div>
            </div>
        </div>

        <!-- The Debaters -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Agree Side -->
            <div id="card-agree" class="bg-slate-50 p-6 rounded-xl border-4 border-slate-200 transition-all duration-300">
                <div class="inline-block bg-emerald-100 text-emerald-800 text-xs px-3 py-1 rounded-full font-bold uppercase mb-3 border border-emerald-200">
                    TEAM AGREE 👍
                </div>
                <div id="name-agree" class="text-3xl font-black text-slate-900 tracking-tight">—</div>
            </div>

            <!-- Disagree Side -->
            <div id="card-disagree" class="bg-slate-50 p-6 rounded-xl border-4 border-slate-200 transition-all duration-300">
                <div class="inline-block bg-rose-100 text-rose-800 text-xs px-3 py-1 rounded-full font-bold uppercase mb-3 border border-rose-200">
                    TEAM DISAGREE 👎
                </div>
                <div id="name-disagree" class="text-3xl font-black text-slate-900 tracking-tight">—</div>
            </div>
        </div>

        <!-- Dynamic Live Alert Instruction -->
        <div id="instruction-bar" class="text-lg font-bold text-amber-700 mb-8 min-h-[28px] bg-amber-50 rounded-lg py-2 border border-amber-100"></div>

        <!-- Control Button -->
        <button id="btn-start" class="w-full bg-gradient-to-r from-amber-500 to-red-600 hover:from-amber-600 hover:to-red-700 text-white font-black text-lg py-4 px-6 rounded-xl shadow-md hover:shadow-lg transition-all transform hover:scale-[1.01] active:scale-[0.99] cursor-pointer tracking-wider uppercase">
            🚀 Start Chaotic Debate
        </button>
    </div>

    <script>
        const students = ["Alexandra", "Adriana", "Wendy", "Barney", "Brisa", "Maribell", "Andrea"];
        const topics = [
            "Is cereal technically a soup?",
            "Should putting pineapple on pizza be punishable by life in prison?",
            "Are hot dogs legally classified as sandwiches?",
            "Is water actually wet, or does it just make other things wet?",
            "Is sleeping with your socks on a sign of a psychopath?"
        ];

        let totalSeconds = 180; // Changed to 3 minutes (180 seconds)
        let turnSeconds = 30;   
        let countdownInterval = null;
        let activeSide = 'agree'; 
        let currentAgreeStudent = '';
        let currentDisagreeStudent = '';

        function playBuzzer() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            oscillator.stop(audioCtx.currentTime + 0.4);
        }

        function initializeDebate() {
            const randomTopic = topics[Math.floor(Math.random() * topics.length)];
            document.getElementById('topic-display').innerText = randomTopic;

            let shuffled = [...students].sort(() => 0.5 - Math.random());
            currentAgreeStudent = shuffled[0];
            currentDisagreeStudent = shuffled[1];

            document.getElementById('name-agree').innerText = currentAgreeStudent;
            document.getElementById('name-disagree').innerText = currentDisagreeStudent;

            totalSeconds = 180; // Reset to 180 seconds on click
            turnSeconds = 30;
            activeSide = 'agree';
            updateVisualIndicators();
        }

        function updateVisualIndicators() {
            const cardAgree = document.getElementById('card-agree');
            const cardDisagree = document.getElementById('card-disagree');
            const instructionBar = document.getElementById('instruction-bar');

            if (activeSide === 'agree') {
                cardAgree.classList.add('active-agree');
                cardAgree.classList.remove('border-slate-200');
                
                cardDisagree.classList.remove('active-disagree');
                cardDisagree.classList.add('border-slate-200');
                cardDisagree.style.backgroundColor = '';
                
                instructionBar.innerHTML = `📢 <span class="text-emerald-700">${currentAgreeStudent}</span> is speaking! <span class="text-slate-500 font-normal">${currentDisagreeStudent} must remain silent.</span>`;
            } else {
                cardDisagree.classList.add('active-disagree');
                cardDisagree.classList.remove('border-slate-200');
                
                cardAgree.classList.remove('active-agree');
                cardAgree.classList.add('border-slate-200');
                cardAgree.style.backgroundColor = '';
                
                instructionBar.innerHTML = `⚡ INTERRUPT! <span class="text-rose-700">${currentDisagreeStudent}</span>, take the floor! <span class="text-slate-500 font-normal">${currentAgreeStudent} must shut up.</span>`;
            }
        }

        function formatTime(sec) {
            const mins = Math.floor(sec / 60).toString().padStart(2, '0');
            const secs = (sec % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        function startTimer() {
            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                totalSeconds--;
                turnSeconds--;

                document.getElementById('total-timer').innerText = formatTime(totalSeconds);
                document.getElementById('turn-timer').innerText = `${turnSeconds}s`;

                if (turnSeconds <= 0 && totalSeconds > 0) {
                    playBuzzer();
                    turnSeconds = 30;
                    activeSide = (activeSide === 'agree') ? 'disagree' : 'agree';
                    updateVisualIndicators();
                }

                if (totalSeconds <= 0) {
                    clearInterval(countdownInterval);
                    playBuzzer();
                    setTimeout(playBuzzer, 500); 
                    document.getElementById('instruction-bar').innerHTML = "🛑 DEBATE OVER! Excellent work holding the floor!";
                    document.getElementById('card-agree').classList.remove('active-agree');
                    document.getElementById('card-disagree').classList.remove('active-disagree');
                    document.getElementById('card-agree').classList.add('border-slate-200');
                    document.getElementById('card-disagree').classList.add('border-slate-200');
                    document.getElementById('btn-start').disabled = false;
                    document.getElementById('btn-start').innerText = "🚀 Start Next Chaotic Debate";
                }
            }, 1000);
        }

        document.getElementById('btn-start').addEventListener('click', function() {
            this.disabled = true;
            this.innerText = "⏳ DEBATE IN PROGRESS...";
            initializeDebate();
            startTimer();
        });
    </script>
</body>
</html>
